name: Deploy to Infomaniak

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: qw6704.ftp.infomaniak.com
          username: qw6704_piixel
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /sites/hypnomedical.piixel.ch/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
